<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sakura Player</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal-container">
      <div class="login-card">
        <div class="login-emoji">🌸</div>
        <h1>Sakura Player</h1>
        <p>Connect Spotify to start playing</p>
        <button id="loginBtn" class="btn-login">Connect with Spotify</button>
      </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="playerApp" class="player-app" style="display:none;">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">sakura<span>♪</span></div>
          <button id="logoutBtn" class="logout-btn">⊗</button>
        </div>
        
        <nav class="nav-menu">
          <button class="nav-item active" data-view="now-playing">
            <span class="nav-icon">▶</span>
            <span>Now Playing</span>
          </button>
          <button class="nav-item" data-view="search">
            <span class="nav-icon">🔍</span>
            <span>Search</span>
          </button>
          <button class="nav-item" data-view="browse">
            <span class="nav-icon">🎵</span>
            <span>Browse</span>
          </button>
          <button class="nav-item" data-view="queue">
            <span class="nav-icon">📋</span>
            <span>Queue</span>
          </button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Now Playing View -->
        <section id="now-playing-view" class="view active">
          <div class="now-playing-container">
            <div class="np-card">
              <div class="np-track" id="trackName">No track playing</div>
              <div class="np-artist" id="artistName">—</div>
              
              <div class="waveform" id="waveform">
                <div class="w-bar" style="--d:0s"></div>
                <div class="w-bar" style="--d:.1s"></div>
                <div class="w-bar" style="--d:.2s"></div>
                <div class="w-bar" style="--d:.3s"></div>
                <div class="w-bar" style="--d:.15s"></div>
              </div>

              <div class="np-time" id="currentTime">0:00</div>
            </div>

            <div class="controls">
              <button id="prevBtn" class="ctrl-btn">⏮</button>
              <button id="playBtn" class="ctrl-btn ctrl-main">▶</button>
              <button id="pauseBtn" class="ctrl-btn ctrl-main" style="display:none;">⏸</button>
              <button id="nextBtn" class="ctrl-btn">⏭</button>
            </div>
          </div>
        </section>

        <!-- Search View -->
        <section id="search-view" class="view">
          <div class="view-header">
            <h2>Search</h2>
          </div>
          <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search for songs, artists...">
            <button id="searchBtn" class="search-btn">Search</button>
          </div>
          <div id="searchResults" class="results-grid"></div>
        </section>

        <!-- Browse View -->
        <section id="browse-view" class="view">
          <div class="view-header">
            <h2>Recommended For You</h2>
            <button id="browseBtn" class="refresh-btn">🔄 Refresh</button>
          </div>
          <div id="recommendedResults" class="results-grid"></div>
        </section>

        <!-- Queue View -->
        <section id="queue-view" class="view">
          <div class="view-header">
            <h2>Queue</h2>
            <button id="clearQueueBtn" class="btn-sm">Clear All</button>
          </div>
          <div id="queueList" class="queue-list">
            <p class="empty-state">🌷 Nothing queued yet</p>
          </div>
        </section>
      </main>
    </div>

    <div class="app-container" style="display:none;"></div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="script.js"></script>
  </body>
</html>
